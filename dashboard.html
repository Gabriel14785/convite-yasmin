<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B1A3A">
  <title>Dashboard — Yasmin 15 anos</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E">
</head>
<body class="dashboard-body">
  <div class="stars" id="stars"></div>

  <!-- TELA DE LOGIN -->
  <div id="loginScreen">
    <div class="login-box">
      <h1 class="cover-title" style="font-size: 2.5rem;">Painel Admin</h1>
      <p class="cover-subtitle" style="margin-bottom: 25px;">— YASMIN 15 ANOS —</p>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="senha">Senha</label>
          <input type="password" id="senha" class="form-input" placeholder="Digite a senha" autocomplete="off">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        <p class="login-error" id="loginError">Senha incorreta</p>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardContent" style="display: none;">
    <div class="dashboard-container">
      <div class="dashboard-header">
        <h1 class="dashboard-title">Confirmações</h1>
        <p class="dashboard-subtitle">Yasmin &bull; 15 anos &bull; Noite Estrelada</p>
      </div>

      <div class="dashboard-stats">
        <div class="stat-card">
          <span class="stat-number" id="statTotal">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="statHoje">0</span>
          <span class="stat-label">Hoje</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="statComMsg">0</span>
          <span class="stat-label">Com mensagem</span>
        </div>
      </div>

      <div class="dashboard-actions">
        <button class="btn" id="refreshBtn">&#8635; Atualizar</button>
        <button class="btn" id="logoutBtn">Sair</button>
      </div>

      <div class="confirmations-table-wrapper">
        <table class="confirmations-table" id="confirmationsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>Telefone</th>
              <th>Mensagem</th>
              <th>Data/Hora</th>
            </tr>
          </thead>
          <tbody id="confirmationsBody">
            <tr>
              <td colspan="5" class="empty-state">Carregando confirmações...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
