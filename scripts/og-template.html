  .shooting {
    position: absolute;
    top: 18%;
    right: 22%;
    width: 80px;
    height: 1px;
    background: linear-gradient(to left, rgba(255,255,255,0.7), transparent);
  }
  .shooting::after {
    content: '';
    position: absolute;
    right: 0;
    top: -1.5px;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 8px white;
  }

  .right {

    align-items: center;

    gap: 14px;
    text-align: center;

    background: linear-gradient(135deg, #E8EEF7 0%, #C9D4E8 50%, #FFFFFF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 30px rgba(201, 212, 232, 0.4);
    margin-bottom: 4px;
  }
  .age {
    font-size: 26px;
    letter-spacing: 14px;
    color: #C9D4E8;
    text-align: center;
    margin-bottom: 8px;
  }
  .photo-frame {
    width: 340px;
    height: 420px;
    padding: 8px;
    background: linear-gradient(135deg, #E8EEF7 0%, #C9D4E8 50%, #FFFFFF 100%);
    border-radius: 200px 200px 14px 14px;
    box-shadow: 0 0 60px rgba(201, 212, 232, 0.4);
  }
  .photo-frame img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 195px 195px 10px 10px;
  }
  .event-title {
    font-family: 'Brush Script MT', cursive;
    font-size: 64px;
    line-height: 1;
    text-align: center;
    background: linear-gradient(135deg, #E8EEF7 0%, #C9D4E8 50%, #FFFFFF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0;
  }
  .divider {
    width: 70px;
    height: 1px;
    background: #C9D4E8;
    opacity: 0.6;
    margin: 4px auto;
  }
  .date {
    font-size: 36px;
    color: #FFFFFF;
    letter-spacing: 6px;
    font-weight: bold;
    text-align: center;
  }
  .time {
    font-size: 24px;
    color: #C9D4E8;
    letter-spacing: 3px;
    text-align: center;
  }
  .theme {
    font-size: 20px;
    color: #C9D4E8;
    font-style: italic;
    margin-top: 6px;
    letter-spacing: 2px;
  }
  .footer {
    position: absolute;
    bottom: 30px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 14px;
    letter-spacing: 4px;
